<!DOCTYPE html>
<html>
<head>

<title>Installer Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#3c4c6e;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#4e6cff;
}

.logout{
background:#ff5e62!important;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
}

.blue{background:#2196f3}
.orange{background:#ff9800}
.green{background:#4caf50}

/* TABLE */

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4e6cff;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

/* BUTTONS */

.call{
background:#4caf50;
border:none;
padding:7px 10px;
color:white;
border-radius:6px;
cursor:pointer;
}

.map{
background:#2196f3;
border:none;
padding:7px 10px;
color:white;
border-radius:6px;
cursor:pointer;
}

.nav{
background:#ff9800;
border:none;
padding:7px 10px;
color:white;
border-radius:6px;
cursor:pointer;
}

.install{
background:#673ab7;
border:none;
padding:7px 10px;
color:white;
border-radius:6px;
cursor:pointer;
}

.route{
background:#ff5722;
border:none;
padding:10px 14px;
color:white;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Installer Panel</h2>

<h3 id="teamName"></h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('jobs')">Today's Jobs</button>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="main">

<div id="dashboard">

<h2>Installer Dashboard</h2>

<div class="cards">

<div class="card blue">
Total Jobs<br>
<span id="totalJobs">0</span>
</div>

<div class="card orange">
Pending Jobs<br>
<span id="pendingJobs">0</span>
</div>

<div class="card green">
Completed<br>
<span id="doneJobs">0</span>
</div>

</div>

</div>


<div id="jobs" style="display:none">

<h2>Today's Installation Jobs</h2>

<button class="route" onclick="optimizeRoute()">
Optimize Route
</button>

<table>

<tr>
<th>Subscriber</th>
<th>Phone</th>
<th>Plan</th>
<th>Agent</th>
<th>Date</th>
<th>Call</th>
<th>Map</th>
<th>Navigate</th>
<th>Status</th>
</tr>

<tbody id="jobTable"></tbody>

</table>

</div>

</div>


<script>

/* INSTALLER TEAM */

let team = localStorage.getItem("installerTeam")

document.getElementById("teamName").innerText="Team: "+team


/* PAGE SWITCH */

function showPage(p){

document.getElementById("dashboard").style.display="none"
document.getElementById("jobs").style.display="none"

document.getElementById(p).style.display="block"

}


/* DATABASE */

async function getSubs(){

let subs=[]

const snapshot = await db.collection("subscribers").get()

snapshot.forEach(doc=>{
subs.push(doc.data())
})

return subs

}


/* ADDED: find subscriber by application code */

async function findIndexByCode(code){

let subs = await getSubs()

return subs.findIndex(s=>s.code===code || s.appcode===code)

}


/* ORIGINAL INSTALL FUNCTION */

async function markInstalled(i){

let subs = await getSubs()

let sub = subs[i]

if(!sub) return

let code = sub.code || sub.appcode

await db.collection("subscribers").doc(code).update({
status:5
})

render()

}


/* ADDED SAFE INSTALL FUNCTION (code based) */

async function markInstalledByCode(code){

await db.collection("subscribers").doc(code).update({
status:5
})

render()

}


/* MAP VIEW */

function viewLocation(lat,long){

let url="https://www.google.com/maps?q="+lat+","+long

window.open(url,"_blank")

}


/* NAVIGATION */

function navigate(lat,long){

let url="https://www.google.com/maps/dir/?api=1&destination="+lat+","+long

window.open(url,"_blank")

}


/* ROUTE OPTIMIZATION */

async function optimizeRoute(){

let subs = await getSubs()

let coords=[]

subs.forEach(s=>{

if(s.installer===team && s.lat && s.long){

coords.push(s.lat+","+s.long)

}

})

if(coords.length===0){

alert("No jobs to route")

return

}

let url="https://www.google.com/maps/dir/"+coords.join("/")

window.open(url,"_blank")

}


/* RENDER JOBS */

async function render(){

let subs = await getSubs()

let table=document.getElementById("jobTable")

table.innerHTML=""

let total=0
let pending=0
let done=0

subs.forEach((s,i)=>{

if(s.installer===team){

total++

if(s.status!=5) pending++
if(s.status==5) done++

table.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${s.phone || "-"}</td>

<td>${s.plan}</td>

<td>${s.agent}</td>

<td>${s.installationDate || "-"}</td>

<td>

<a href="tel:${s.phone}">
<button class="call">Call</button>
</a>

</td>

<td>

<button class="map"
onclick="viewLocation('${s.lat}','${s.long}')">

Map

</button>

</td>

<td>

<button class="nav"
onclick="navigate('${s.lat}','${s.long}')">

Navigate

</button>

</td>

<td>

${s.status==5
?"Installed"
:`<button class="install"
onclick="markInstalled(${i})"
data-code="${s.code || s.appcode}">

Mark Installed

</button>`
}

</td>

</tr>

`

}

})

document.getElementById("totalJobs").innerText=total
document.getElementById("pendingJobs").innerText=pending
document.getElementById("doneJobs").innerText=done

}


/* LOGOUT */

function logout(){

localStorage.removeItem("installerTeam")

window.location="index.html"

}


/* AUTO SYNC */

render()

setInterval(render,4000)

</script>

</body>
</html>
