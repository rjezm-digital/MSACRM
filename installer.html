<!DOCTYPE html>
<html>
<head>

<title>Installer Panel</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#3c4c6e;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#4e6cff;
}

.logout{
background:#ff5e62!important;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
}

.blue{background:#2196f3}
.orange{background:#ff9800}
.green{background:#4caf50}

/* TABLE */

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4e6cff;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.install{
background:#4caf50;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Installer Panel</h2>

<h3 id="teamName"></h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('jobs')">Installation Jobs</button>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="main">

<!-- DASHBOARD -->

<div id="dashboard">

<h2>Installer Dashboard</h2>

<div class="cards">

<div class="card blue">
Total Jobs<br>
<span id="totalJobs">0</span>
</div>

<div class="card orange">
Pending Jobs<br>
<span id="pendingJobs">0</span>
</div>

<div class="card green">
Completed<br>
<span id="doneJobs">0</span>
</div>

</div>

</div>


<!-- JOBS -->

<div id="jobs" style="display:none">

<h2>Installation Jobs</h2>

<table>

<tr>
<th>Subscriber</th>
<th>Plan</th>
<th>Agent</th>
<th>Installer Team</th>
<th>Date</th>
<th>Action</th>
</tr>

<tbody id="jobTable"></tbody>

</table>

</div>

</div>


<script>

/* GET TEAM */

let team = localStorage.getItem("installerTeam")

document.getElementById("teamName").innerText="Team: "+team


/* PAGE SWITCH */

function showPage(p){

document.getElementById("dashboard").style.display="none"
document.getElementById("jobs").style.display="none"

document.getElementById(p).style.display="block"

}


/* GET DATABASE */

function getSubs(){

let data=localStorage.getItem("subs")

if(!data) return []

return JSON.parse(data)

}


/* MARK INSTALLED */

function markInstalled(i){

let subs=getSubs()

subs[i].status=5

localStorage.setItem("subs",JSON.stringify(subs))

render()

}


/* RENDER */

function render(){

let subs=getSubs()

let table=document.getElementById("jobTable")

table.innerHTML=""

let total=0
let pending=0
let done=0

subs.forEach((s,i)=>{

if(s.installer===team){

total++

if(s.status!=5) pending++
if(s.status==5) done++

table.innerHTML+=`

<tr>

<td>${s.name}</td>
<td>${s.plan}</td>
<td>${s.agent}</td>
<td>${s.installer}</td>
<td>${s.installationDate || "-"}</td>

<td>

${s.status==5
?"Completed"
:`<button class="install" onclick="markInstalled(${i})">Mark Installed</button>`
}

</td>

</tr>

`

}

})

document.getElementById("totalJobs").innerText=total
document.getElementById("pendingJobs").innerText=pending
document.getElementById("doneJobs").innerText=done

}


/* LOGOUT */

function logout(){

localStorage.removeItem("installerTeam")

window.location="index.html"

}


/* AUTO SYNC */

render()

setInterval(render,2000)

</script>

</body>
</html>
