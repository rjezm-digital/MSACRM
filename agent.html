<!DOCTYPE html>
<html>
<head>

<title>Agent Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

.sidebar{
width:240px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#3c4c6e;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#4e6cff;
}

.logout{
background:#ff5e62!important;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
}

.c1{background:#7b1fa2}
.c2{background:#ff9800}
.c3{background:#4caf50}
.c4{background:#ff5252}
.c5{background:#00acc1}
.c6{background:#795548}

input,select{
width:100%;
padding:10px;
margin:6px 0;
}

button.add{
background:#4e6cff;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4e6cff;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.status{
padding:4px 10px;
border-radius:6px;
color:white;
}

.encoded{background:#777}

</style>
</head>

<body>

<div class="sidebar">

<h2>Agent Panel</h2>

<button onclick="showPage('monitor')">Monitoring</button>
<button onclick="showPage('subs')">Subscribers</button>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="main">

<!-- MONITORING -->

<div id="monitor">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card c1">
Applications<br>
<span id="applications">0</span>
</div>

<div class="card c2">
Pending<br>
<span id="pending">0</span>
</div>

<div class="card c3">
Installed<br>
<span id="installed">0</span>
</div>

<div class="card c4">
Total Earnings<br>
₱<span id="earnings">0</span>
</div>

<div class="card c5">
Weekly Earnings<br>
₱<span id="weekly">0</span>
</div>

<div class="card c6">
Monthly Earnings<br>
₱<span id="monthly">0</span>
</div>

</div>

<canvas id="chart"></canvas>

</div>


<!-- SUBSCRIBERS -->

<div id="subs" style="display:none">

<h2>Add Subscriber</h2>

<input id="name" placeholder="Subscriber Name">

<input id="address" placeholder="Address">

<input id="phone" placeholder="Phone Number">

<input id="appcode" placeholder="Application Code">

<input id="lat" placeholder="Latitude">

<input id="long" placeholder="Longitude">

<select id="plan">

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>

<option value="1349">FiberX Play 1349</option>
<option value="1599">FiberX Play 1599</option>
<option value="1999">FiberX Play 1999</option>

<option value="2899">FiberX Bundle 2899</option>
<option value="3799">FiberX Bundle 3799</option>

<option value="3000">MicroBiz 3000</option>
<option value="4000">MicroBiz 4000</option>

<option value="5000">FlexiBiz 5000</option>
<option value="7000">FlexiBiz 7000</option>

<option value="10000">BIZ 10000</option>

<option value="999">TOD 999</option>
<option value="1299">TOD 1299</option>

</select>

<button class="add" onclick="addSubscriber()">
Add Subscriber
</button>

<table>

<tr>
<th>Name</th>
<th>Plan</th>
<th>Status</th>
</tr>

<tbody id="subTable"></tbody>

</table>

</div>

</div>


<script>

/* PAGE SWITCH */

function showPage(p){

document.getElementById("monitor").style.display="none"
document.getElementById("subs").style.display="none"

document.getElementById(p).style.display="block"

}


/* DATABASE */

function getSubs(){

let data=localStorage.getItem("subs")

if(!data) return []

return JSON.parse(data)

}


/* ADD SUBSCRIBER */

function addSubscriber(){

let subs=getSubs()

let plan=document.getElementById("plan").value

subs.push({

name:document.getElementById("name").value,
address:document.getElementById("address").value,
phone:document.getElementById("phone").value,
appcode:document.getElementById("appcode").value,
lat:document.getElementById("lat").value,
long:document.getElementById("long").value,
plan:plan,
agent:localStorage.getItem("agent"),
status:0

})

localStorage.setItem("subs",JSON.stringify(subs))

render()

}


/* RENDER */

function render(){

let subs=getSubs()

let table=document.getElementById("subTable")

table.innerHTML=""

let applications=0
let pending=0
let installed=0
let earnings=0

subs.forEach(s=>{

if(s.agent==localStorage.getItem("agent")){

applications++

if(s.status==5){

installed++

earnings+= (s.plan/2)-50

}

table.innerHTML+=`

<tr>

<td>${s.name}</td>

<td>${s.plan}</td>

<td><span class="status encoded">Encoded</span></td>

</tr>

`

}

})

document.getElementById("applications").innerText=applications
document.getElementById("installed").innerText=installed
document.getElementById("earnings").innerText=earnings
document.getElementById("weekly").innerText=earnings
document.getElementById("monthly").innerText=earnings

}


/* GRAPH */

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Applications","Installed"],
datasets:[{

data:[0,0]

}]

}

})


/* LOGOUT */

function logout(){

localStorage.removeItem("agent")

window.location="index.html"

}

render()

</script>

</body>
</html>
