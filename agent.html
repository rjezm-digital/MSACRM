<!DOCTYPE html>
<html>
<head>

<title>Agent Panel</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

.sidebar{
width:240px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#3c4c6e;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#4e6cff;
}

.logout{
background:#ff5e62!important;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
}

.c1{background:#7b1fa2}
.c2{background:#ff9800}
.c3{background:#4caf50}
.c4{background:#ff5252}
.c5{background:#00acc1}
.c6{background:#795548}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:10px;
}

.full{
grid-column:1/span 2;
}

input,select{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

button.add{
background:#4e6cff;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
background:white;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4e6cff;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

.status{
padding:4px 10px;
border-radius:6px;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Agent Panel</h2>

<button onclick="showPage('monitor')">Monitoring</button>
<button onclick="showPage('subs')">Subscribers</button>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="main">

<div id="monitor">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card c1">
Applications<br>
<span id="applications">0</span>
</div>

<div class="card c2">
Pending<br>
<span id="pending">0</span>
</div>

<div class="card c3">
Installed<br>
<span id="installed">0</span>
</div>

<div class="card c4">
Total Earnings<br>
₱<span id="earnings">0</span>
</div>

<div class="card c5">
Weekly Earnings<br>
₱<span id="weekly">0</span>
</div>

<div class="card c6">
Monthly Earnings<br>
₱<span id="monthly">0</span>
</div>

</div>

<canvas id="chart"></canvas>

</div>


<div id="subs" style="display:none">

<h2>Add Subscriber</h2>

<div class="form-grid">

<input id="name" placeholder="Subscriber Name">
<input id="phone" placeholder="Phone Number">
<input id="address" class="full" placeholder="Address">
<input id="appcode" placeholder="Application Code">

<select id="plan">

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>

<option value="1349">FiberX Play 1349</option>
<option value="1599">FiberX Play 1599</option>
<option value="1999">FiberX Play 1999</option>
<option value="2499">FiberX Play 2499</option>

<option value="2899">FiberX Bundle 2899</option>
<option value="3799">FiberX Bundle 3799</option>

<option value="3000">MicroBiz 3000</option>
<option value="4000">MicroBiz 4000</option>

<option value="5000">FlexiBIZ 5000</option>
<option value="7000">FlexiBIZ 7000</option>
<option value="9000">FlexiBIZ 9000</option>

<option value="10000">BIZ 10000</option>
<option value="15000">BIZ 15000</option>

<option value="999">TOD 999</option>
<option value="1299">TOD 1299</option>

</select>

<input id="lat" placeholder="Latitude">
<input id="long" placeholder="Longitude">

</div>

<button class="add" onclick="addSubscriber()">Add Subscriber</button>

<table>

<tr>
<th>Name</th>
<th>Address</th>
<th>Phone</th>
<th>Application Code</th>
<th>Plan</th>
<th>Status</th>
<th>Installer</th>
<th>Date</th>
</tr>

<tbody id="subTable"></tbody>

</table>

</div>

</div>


<script>

const firebaseConfig = {
apiKey:"AIzaSyBwrJprjuU4BywFapZyw_SsBcsJAYo5OPU",
authDomain:"convergecrm-7c237.firebaseapp.com",
projectId:"convergecrm-7c237",
storageBucket:"convergecrm-7c237.firebasestorage.app",
messagingSenderId:"1078658502451",
appId:"1:1078658502451:web:7d81a4d127d42f15eab846"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

</script>


<script>

let chart

function showPage(p){

document.getElementById("monitor").style.display="none"
document.getElementById("subs").style.display="none"

document.getElementById(p).style.display="block"

}


async function getSubs(){

let subs=[]

const snapshot=await db.collection("subscribers").get()

snapshot.forEach(doc=>{
subs.push(doc.data())
})

return subs

}


async function addSubscriber(){

let code=document.getElementById("appcode").value

await db.collection("subscribers").doc(code).set({

name:document.getElementById("name").value,
address:document.getElementById("address").value,
phone:document.getElementById("phone").value,
appcode:code,
code:code,
lat:document.getElementById("lat").value,
long:document.getElementById("long").value,
plan:parseInt(document.getElementById("plan").value),
agent:localStorage.getItem("agent"),
status:0

})

alert("Subscriber added!")

render()

}


function statusLabel(status){

if(status==0) return '<span class="status" style="background:#777">Encoded</span>'
if(status==1) return '<span class="status" style="background:#3f51b5">OMD</span>'
if(status==2) return '<span class="status" style="background:#ff9800">Pending</span>'
if(status==3) return '<span class="status" style="background:#00acc1">Approved</span>'
if(status==4) return '<span class="status" style="background:#ffc107">For Installation</span>'
if(status==5) return '<span class="status" style="background:#9c27b0">Install Done</span>'
if(status==6) return '<span class="status" style="background:#4caf50">Installed</span>'

return ""

}


function updateChart(app,pending,inst){

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Applications","Pending","Installed"],
datasets:[{
data:[app,pending,inst],
backgroundColor:["#7b1fa2","#ff9800","#4caf50"]
}]
},

options:{
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}
}

})

}


async function render(){

let subs=await getSubs()

let table=document.getElementById("subTable")

table.innerHTML=""

let applications=0
let installed=0
let pending=0
let earnings=0

subs.forEach(s=>{

if(s.appcode && !s.code){ s.code=s.appcode }

if(s.agent==localStorage.getItem("agent")){

applications++

if(s.status>=1 && s.status<=3) pending++

if(s.status>=5){
installed++
earnings+=(s.plan/2)-50
}

table.innerHTML+=`

<tr>

<td>${s.name}</td>
<td>${s.address}</td>
<td>${s.phone}</td>
<td>${s.appcode}</td>
<td>${s.plan}</td>
<td>${statusLabel(s.status)}</td>
<td>${s.installer || "-"}</td>
<td>${s.installationDate || "-"}</td>

</tr>

`

}

})

document.getElementById("applications").innerText=applications
document.getElementById("pending").innerText=pending
document.getElementById("installed").innerText=installed
document.getElementById("earnings").innerText=earnings
document.getElementById("weekly").innerText=earnings
document.getElementById("monthly").innerText=earnings

updateChart(applications,pending,installed)

}


function logout(){

localStorage.removeItem("agent")
window.location="index.html"

}


render()

setInterval(render,4000)

</script>

</body>
</html>
