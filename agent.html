<!DOCTYPE html>
<html>
<head>

<title>Agent Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
margin:8px 0;
padding:12px;
border:none;
background:#3c4c6e;
color:white;
border-radius:6px;
cursor:pointer;
}

.sidebar button:hover{
background:#4e6cff;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
font-size:18px;
}

.purple{background:#6a11cb}
.orange{background:#ff9800}
.green{background:#4caf50}
.red{background:#ff5e62}
.cyan{background:#00bcd4}
.brown{background:#795548}

/* FORM */

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

/* TABLE */

table{
width:100%;
background:white;
border-collapse:collapse;
}

th{
background:#f2f2f2;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

/* STATUS COLORS */

.status{
padding:4px 8px;
border-radius:6px;
color:white;
font-size:12px;
}

.encoded{background:#9e9e9e}
.omd{background:#2196f3}
.pending{background:#ff9800}
.approved{background:#9c27b0}
.install{background:#ffc107;color:black}
.installed{background:#4caf50}

</style>

</head>

<body>

<div class="sidebar">

<h2>Agent Panel</h2>

<button onclick="showPage('monitor')">Monitoring</button>
<button onclick="showPage('subs')">Subscribers</button>

<button onclick="logout()" style="background:#ff5e62;">Logout</button>

</div>

<div class="main">

<!-- MONITORING -->

<div id="monitor">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card purple">
Applications<br>
<span id="apps">0</span>
</div>

<div class="card orange">
Pending<br>
<span id="pending">0</span>
</div>

<div class="card green">
Installed<br>
<span id="installed">0</span>
</div>

<div class="card red">
Total Earnings<br>
₱<span id="total">0</span>
</div>

<div class="card cyan">
Weekly Earnings<br>
₱<span id="weekly">0</span>
</div>

<div class="card brown">
Monthly Earnings<br>
₱<span id="monthly">0</span>
</div>

</div>

<canvas id="salesChart"></canvas>

</div>

<!-- SUBSCRIBERS -->

<div id="subs" style="display:none">

<h2>Add Subscriber</h2>

<input id="name" placeholder="Subscriber Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="code" placeholder="Application Code">

<select id="plan">

<!-- SUPER FIBER -->

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<!-- FIBERX -->

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>
<option value="7000">FiberX 7000</option>

<!-- BUNDLES -->

<option value="1700">FiberX 1500 + Vision</option>
<option value="2200">FiberX 2000 + Vision</option>
<option value="2700">FiberX 2500 + Vision</option>

<!-- TOD -->

<option value="1699">TOD 1699</option>
<option value="1999">TOD 1999</option>
<option value="3000">TOD 3000</option>
<option value="3500">TOD 3500</option>

<!-- FLEXIBIZ -->

<option value="1500">FlexiBiz 1500</option>
<option value="2000">FlexiBiz 2000</option>
<option value="3000">FlexiBiz 3000</option>
<option value="5000">FlexiBiz 5000</option>

<!-- MICROBIZ -->

<option value="1449">MicroBiz MAX 1449</option>
<option value="1549">MicroBiz MAX 1549</option>
<option value="1749">MicroBiz MAX 1749</option>
<option value="2099">MicroBiz MAX 2099</option>
<option value="2449">MicroBiz MAX 2449</option>

</select>

<button onclick="addSubscriber()">Add Subscriber</button>

<h3>My Applications</h3>

<table>

<tr>
<th>Agent</th>
<th>Name</th>
<th>Plan</th>
<th>Status</th>
<th>Delete</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

</div>

<script>

let agent=localStorage.getItem("agent")

let subs=JSON.parse(localStorage.getItem("subs")||"[]")

const stages=["Encoded","OMD","Pending","Approved","For Installation","Installed"]

const colors=["encoded","omd","pending","approved","install","installed"]

let chart

function showPage(p){

monitor.style.display="none"
subs.style.display="none"

document.getElementById(p).style.display="block"

}

function save(){
localStorage.setItem("subs",JSON.stringify(subs))
}

function addSubscriber(){

subs.push({
agent:agent,
name:name.value,
address:address.value,
phone:phone.value,
code:code.value,
plan:parseInt(plan.value),
status:0,
date:new Date()
})

save()
render()

}

function removeSub(i){

subs.splice(i,1)

save()
render()

}

function render(){

let apps=0
let pending=0
let installed=0
let total=0
let weekly=0
let monthly=0

let today=new Date()

table.innerHTML=""

subs.forEach((s,i)=>{

if(s.agent!==agent) return

apps++

if(stages[s.status]=="Pending") pending++

if(stages[s.status]=="Installed"){

installed++

let com=(s.plan/2)-50

total+=com

let diff=(today-new Date(s.date))/(1000*60*60*24)

if(diff<=7) weekly+=com
if(diff<=30) monthly+=com

}

table.innerHTML+=`

<tr>

<td>${s.agent}</td>
<td>${s.name}</td>
<td>${s.plan}</td>

<td>
<span class="status ${colors[s.status]}">
${stages[s.status]}
</span>
</td>

<td onclick="removeSub(${i})">X</td>

</tr>

`

})

apps.innerText=apps
pending.innerText=pending
installed.innerText=installed
total.innerText=total
weekly.innerText=weekly
monthly.innerText=monthly

drawChart(apps,pending,installed)

}

function drawChart(a,p,i){

if(chart) chart.destroy()

chart=new Chart(document.getElementById("salesChart"),{

type:"bar",

data:{
labels:["Applications","Pending","Installed"],
datasets:[{
data:[a,p,i]
}]
}

})

}

function logout(){

localStorage.removeItem("agent")
window.location="index.html"

}

render()

</script>

</body>
</html>
