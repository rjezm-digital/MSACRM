<!DOCTYPE html>
<html>
<head>

<title>Agent Panel</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

.sidebar{
width:230px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
margin:8px 0;
padding:10px;
background:#3a4a6a;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
}

.c1{background:#6a11cb}
.c2{background:#ff9800}
.c3{background:#4caf50}
.c4{background:#ff5e62}
.c5{background:#00bcd4}
.c6{background:#795548}

input,select{
width:100%;
padding:10px;
margin:6px 0;
}

.sub{
background:white;
padding:15px;
border-radius:8px;
margin:10px 0;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Agent Panel</h2>

<button onclick="showPage('monitor')">Monitoring</button>
<button onclick="showPage('add')">Add Subscriber</button>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div id="monitorPage">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card c1">Applications <br><span id="apps">0</span></div>
<div class="card c2">Pending <br><span id="pending">0</span></div>
<div class="card c3">Installed <br><span id="installed">0</span></div>

</div>

<div id="subscriberList"></div>

</div>


<div id="addPage" style="display:none">

<h2>Add Subscriber</h2>

<input id="name" placeholder="Subscriber Name">
<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone Number">
<input id="code" placeholder="Application Code">

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<select id="plan">

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>

<option value="1700">FiberX 1500 + Vision</option>
<option value="2200">FiberX 2000 + Vision</option>

<option value="1699">TOD 1699</option>
<option value="1999">TOD 1999</option>

<option value="1500">FlexiBIZ 1500</option>
<option value="2000">FlexiBIZ 2000</option>

<option value="1449">MicroBIZ MAX 1449</option>
<option value="1549">MicroBIZ MAX 1549</option>

</select>

<button onclick="addSubscriber()">Add Subscriber</button>

</div>

</div>

<script>

let agent=localStorage.getItem("agent")
let subs=JSON.parse(localStorage.getItem("subs")||"[]")

const stages=["Applied","OMD","Pending","Approved","For Installation","Installed"]

function showPage(page){

document.getElementById("monitorPage").style.display="none"
document.getElementById("addPage").style.display="none"

if(page==="monitor"){
document.getElementById("monitorPage").style.display="block"
}

if(page==="add"){
document.getElementById("addPage").style.display="block"
}

}

function save(){
localStorage.setItem("subs",JSON.stringify(subs))
}

function addSubscriber(){

subs.push({
agent:agent,
name:name.value,
address:address.value,
phone:phone.value,
code:code.value,
lat:lat.value,
lng:lng.value,
plan:plan.value,
status:0
})

save()
render()

}

function nextStatus(i){

if(subs[i].status<5){
subs[i].status++
save()
render()
}

}

function render(){

let list=document.getElementById("subscriberList")
list.innerHTML=""

let apps=0
let pending=0
let installed=0

subs.forEach((s,i)=>{

if(s.agent!==agent) return

apps++

if(stages[s.status]=="Pending") pending++
if(stages[s.status]=="Installed") installed++

list.innerHTML+=`

<div class="sub">

<b>${s.name}</b><br>

Plan: ${s.plan}<br>
Status: ${stages[s.status]}<br>

<button onclick="nextStatus(${i})">Next Status</button>

</div>

`

})

apps.innerText=apps
pending.innerText=pending
installed.innerText=installed

}

function logout(){
location="index.html"
}

render()

</script>

</body>
</html>
