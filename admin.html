<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

.sidebar{
width:230px;
background:#25324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
margin:8px 0;
padding:10px;
background:#3a4a6a;
border:none;
color:white;
border-radius:6px;
}

.main{
flex:1;
padding:30px;
}

#map{
height:500px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="show('monitor')">Monitoring</button>
<button onclick="show('map')">Global Map</button>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div id="monitorSection">

<h2>Sales Monitoring</h2>

<p>Total Applications: <span id="apps"></span></p>
<p>Pending: <span id="pending"></span></p>
<p>Installed: <span id="installed"></span></p>

</div>

<div id="mapSection" style="display:none">

<h2>Global Subscriber Map</h2>

<div id="map"></div>

</div>

</div>

<script>

let subs=JSON.parse(localStorage.getItem("subs")||"[]")

function show(section){

monitorSection.style.display="none"
mapSection.style.display="none"

if(section==="monitor"){
monitorSection.style.display="block"
}

if(section==="map"){
mapSection.style.display="block"
loadMap()
}

}

function loadMap(){

let map=L.map('map').setView([9.7,124],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let cluster=L.markerClusterGroup()

subs.forEach(s=>{

if(s.lat && s.lng){

cluster.addLayer(
L.marker([s.lat,s.lng]).bindPopup(s.name)
)

}

})

map.addLayer(cluster)

}

function logout(){
location="index.html"
}

</script>

</body>
</html>
