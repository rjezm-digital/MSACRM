<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#eef1f7;
}

.sidebar{
width:220px;
background:#26324a;
color:white;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
margin:8px 0;
padding:10px;
background:#3a4a6a;
border:none;
color:white;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
color:white;
}

.c1{background:#6a11cb}
.c2{background:#ff9800}
.c3{background:#4caf50}
.c4{background:#ff5e62}
.c5{background:#00bcd4}
.c6{background:#795548}

table{
width:100%;
background:white;
border-collapse:collapse;
}

th{
background:#4a6cf7;
color:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="show('monitor')">Monitoring</button>
<button onclick="show('subs')">Subscribers</button>
<button onclick="show('map')">Map</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div id="monitor">

<h2>Sales Monitoring</h2>

<div class="cards">

<div class="card c1">Applications<br><span id="apps"></span></div>
<div class="card c2">Pending<br><span id="pending"></span></div>
<div class="card c3">Installed<br><span id="installed"></span></div>
<div class="card c4">Total Earnings<br>₱<span id="total"></span></div>
<div class="card c5">Weekly Earnings<br>₱<span id="weekly"></span></div>
<div class="card c6">Monthly Earnings<br>₱<span id="monthly"></span></div>

</div>

</div>

<div id="subs" style="display:none">

<h2>Subscribers</h2>

<table>

<tr>
<th>Agent</th>
<th>Name</th>
<th>Plan</th>
<th>Status</th>
</tr>

<tbody id="table"></tbody>

</table>

</div>

<div id="map" style="display:none">

<h2>Global Map</h2>

<p>(Map system can be connected to your KMZ fiber map viewer)</p>

</div>

</div>

<script>

let subs=JSON.parse(localStorage.getItem("subs")||"[]")

let stages=["Applied","OMD","Pending","Approved","For Installation","Installed"]

function show(id){
monitor.style.display="none"
subs.style.display="none"
map.style.display="none"
document.getElementById(id).style.display="block"
}

function render(){

table.innerHTML=""

subs.forEach(s=>{

table.innerHTML+=`

<tr>

<td>${s.agent}</td>
<td>${s.name}</td>
<td>${s.plan}</td>
<td>${stages[s.status]}</td>

</tr>

`

})

}

function logout(){
location="index.html"
}

render()

</script>

</body>
</html>
