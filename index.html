<!doctype html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#020617;
color:white;
}

.glass{
background:rgba(30,41,59,.7);
backdrop-filter:blur(14px);
border:1px solid rgba(148,163,184,.1);
border-radius:16px;
}

.card{
padding:16px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

</style>

</head>


<body class="flex flex-col min-h-screen">


<header class="flex items-center justify-between px-4 py-3 glass">

<div class="flex items-center gap-3">

<img src="https://seeklogo.com/images/C/converge-ict-logo-7F4C8A2C1B-seeklogo.com.png" class="h-8">

<h1 class="font-semibold">Converge Agent CRM</h1>

</div>

</header>



<main class="p-4 flex-1 space-y-4">


<div id="stats" class="grid grid-cols-2 gap-3"></div>



<input id="search"
placeholder="Search customer..."
class="w-full p-3 rounded-xl bg-slate-900">



<div id="planStats" class="glass card text-sm"></div>



<div id="map" class="h-72 rounded-xl"></div>



<div id="list" class="space-y-3"></div>

</main>



<!-- FLOAT BUTTON -->

<button id="btn-add"
class="fixed bottom-24 right-6 w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center">

<i data-lucide="plus"></i>

</button>



<!-- BOTTOM NAV -->

<div class="fixed bottom-0 left-0 right-0 glass flex justify-around py-3">

<button id="btn-calendar">
<i data-lucide="calendar"></i>
</button>

<button id="btn-export">
<i data-lucide="download"></i>
</button>

<label>
<i data-lucide="upload"></i>
<input type="file" id="importFile" hidden>
</label>

</div>



<footer class="text-center text-xs text-slate-400 py-4">

© 2026 Converge Agent CRM  
By Randy Tadlas

</footer>



<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="glass card w-full max-w-lg">

<h2 class="mb-3 font-semibold">New Application</h2>

<form id="form" class="space-y-2">

<input id="code" placeholder="Code"
class="w-full p-3 rounded-xl bg-slate-900">

<input id="name" placeholder="Customer"
class="w-full p-3 rounded-xl bg-slate-900">

<input id="phone" placeholder="Phone"
class="w-full p-3 rounded-xl bg-slate-900">

<input id="address" placeholder="Address"
class="w-full p-3 rounded-xl bg-slate-900">


<select id="plan"
class="w-full p-3 rounded-xl bg-slate-900">

<option>Surf2Sawa 25 Mbps — ₱700</option>

<option>Super FiberX 1349 — 200 Mbps — ₱1349</option>
<option>Super FiberX 1599 — 400 Mbps — ₱1599</option>

<option>FiberX 1500 — 300 Mbps — ₱1500</option>
<option>FiberX 2000 — 500 Mbps — ₱2000</option>
<option>FiberX 2500 — 700 Mbps — ₱2500</option>

<option>GameChanger EZ — 400 Mbps — ₱1800</option>

<option>FiberX Time-of-Day — ₱1699</option>

<option>MicroBiz 1500 — 300 Mbps — ₱1500</option>
<option>MicroBiz 2500 — 700 Mbps — ₱2500</option>

<option>FlexiBiz 3000 — 500 Mbps — ₱3000</option>
<option>FlexiBiz 5000 — 800 Mbps — ₱5000</option>
<option>FlexiBiz 7000 — 1 Gbps — ₱7000</option>

</select>


<select id="status"
class="w-full p-3 rounded-xl bg-slate-900">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>


<input type="date" id="install"
class="w-full p-3 rounded-xl bg-slate-900">


<div class="flex gap-2">

<button class="flex-1 p-3 bg-blue-600 rounded-xl">
Save
</button>

<button type="button" id="cancel"
class="flex-1 p-3 bg-slate-700 rounded-xl">
Cancel
</button>

</div>

</form>

</div>

</div>



<script>

const $=id=>document.getElementById(id)

let records=JSON.parse(localStorage.getItem("crm"))||[]

let map
let markers=[]


function save(){

localStorage.setItem("crm",JSON.stringify(records))

}



function price(plan){

return parseInt(plan.match(/₱(\d+)/)[1])

}



function commission(plan){

let p=price(plan)

if(p<=1500)return 800
if(p<=2500)return 1200
return 2000

}



function stats(){

let installed=records.filter(r=>r.status==="Installed").length

let comm=records.reduce((t,r)=>t+commission(r.plan),0)

$("stats").innerHTML=`

<div class="glass card">
<p class="text-xs text-slate-400">Total</p>
<p class="text-xl font-semibold">${records.length}</p>
</div>

<div class="glass card">
<p class="text-xs text-slate-400">Installed</p>
<p class="text-xl font-semibold">${installed}</p>
</div>

<div class="glass card">
<p class="text-xs text-slate-400">Commission</p>
<p class="text-xl font-semibold text-green-400">₱${comm}</p>
</div>

`

}



function list(){

$("list").innerHTML=""

records.forEach((r,i)=>{

let div=document.createElement("div")

div.className="glass card"

div.innerHTML=`

<div class="flex justify-between">
<b>${r.name}</b>
<span class="text-xs">${r.status}</span>
</div>

<p class="text-xs text-slate-400">${r.plan}</p>

<div class="flex justify-between mt-2 text-xs">

<span class="text-green-400">₱${commission(r.plan)}</span>

<div class="flex gap-2">

<button onclick="advance(${i})">
<i data-lucide="arrow-right"></i>
</button>

<button onclick="delRec(${i})">
<i data-lucide="trash"></i>
</button>

</div>

</div>

`

$("list").appendChild(div)

})

lucide.createIcons()

}



function advance(i){

const order=["Application","OMD","Approved","Scheduled","Installed"]

let idx=order.indexOf(records[i].status)

if(idx<order.length-1)
records[i].status=order[idx+1]

save()

stats()
list()

}



function delRec(i){

records.splice(i,1)

save()

stats()
list()

renderPins()

}



$("btn-add").onclick=()=>$("modal").classList.remove("hidden")

$("cancel").onclick=()=>$("modal").classList.add("hidden")



$("form").onsubmit=e=>{

e.preventDefault()

records.push({

code:$("code").value,
name:$("name").value,
phone:$("phone").value,
address:$("address").value,
plan:$("plan").value,
status:$("status").value,
install:$("install").value

})

save()

$("modal").classList.add("hidden")

stats()
list()

addPin($("address").value)

}



function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

center:{lat:10.3157,lng:123.8854},

zoom:12

})

renderPins()

}



function renderPins(){

markers.forEach(m=>m.setMap(null))

markers=[]

records.forEach(r=>{

addPin(r.address)

})

}



function addPin(address){

let geocoder=new google.maps.Geocoder()

geocoder.geocode({address:address},function(results,status){

if(status==="OK"){

let marker=new google.maps.Marker({

map:map,
position:results[0].geometry.location

})

markers.push(marker)

}

})

}



$("btn-export").onclick=()=>{

let blob=new Blob([JSON.stringify(records)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="crm.json"

a.click()

}



$("importFile").onchange=e=>{

let reader=new FileReader()

reader.onload=function(){

records=JSON.parse(reader.result)

save()

stats()
list()
renderPins()

}

reader.readAsText(e.target.files[0])

}



stats()
list()

lucide.createIcons()

</script>



<!-- GOOGLE MAPS -->

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAP_KEY&callback=initMap">
</script>

</body>
</html>
