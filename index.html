<!doctype html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent CRM</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
background:#0f172a;
color:#f1f5f9;
}

.font-display{
font-family:'Fraunces',serif;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body class="flex flex-col min-h-screen">


<header class="flex items-center justify-between px-6 py-4 bg-slate-800 border-b border-slate-700">

<div class="flex items-center gap-4">

<img src="https://seeklogo.com/images/C/converge-ict-logo-7F4C8A2C1B-seeklogo.com.png" class="h-10">

<div>
<h1 class="font-display text-xl">Agent Dashboard</h1>
<p class="text-sm text-slate-400">Converge Sales CRM</p>
</div>

</div>


<div class="flex gap-3 flex-wrap">

<button id="btn-calendar" class="px-3 py-2 bg-slate-700 rounded text-sm">
Calendar
</button>

<button id="btn-export" class="px-3 py-2 bg-slate-700 rounded text-sm">
Export
</button>

<label class="px-3 py-2 bg-slate-700 rounded text-sm cursor-pointer">
Import
<input type="file" id="importFile" hidden>
</label>

<button id="btn-add"
class="px-3 py-2 bg-blue-500 rounded text-sm flex gap-2 items-center">
<i data-lucide="plus"></i>
New
</button>

</div>

</header>



<main class="p-6 flex-1">


<div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>



<div class="bg-slate-800 border border-slate-700 rounded-xl p-4 mb-6">

<h3 class="font-display mb-3">Plan Analytics</h3>

<div id="planStats" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>

</div>



<div class="flex gap-3 mb-4 flex-wrap">

<input id="search"
placeholder="Search customer..."
class="flex-1 px-4 py-2 bg-slate-800 border border-slate-700 rounded">

<select id="filter"
class="px-4 py-2 bg-slate-800 border border-slate-700 rounded">

<option value="all">All Status</option>
<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>

</div>



<div class="border border-slate-700 rounded-xl overflow-x-auto">

<table class="w-full text-sm">

<thead class="bg-slate-800 text-slate-400">

<tr>

<th class="px-4 py-3 text-left">Code</th>
<th class="px-4 py-3 text-left">Customer</th>
<th class="px-4 py-3 text-left">Phone</th>
<th class="px-4 py-3 text-left">Plan</th>
<th class="px-4 py-3 text-left">Status</th>
<th class="px-4 py-3 text-left">Commission</th>
<th class="px-4 py-3 text-left">Actions</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</main>



<footer class="text-center text-sm text-slate-400 py-4 border-t border-slate-700 bg-slate-900">

© 2026 Converge Agent CRM  
<br>
By Randy Tadlas

</footer>



<div id="modal" class="modal hidden">

<div class="bg-slate-800 border border-slate-700 rounded-xl p-6 w-full max-w-lg">

<h2 class="font-display text-lg mb-4">New Application</h2>

<form id="form" class="space-y-3">

<input id="code" placeholder="Application Code"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">

<input id="name" placeholder="Customer Name"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">

<input id="phone" placeholder="Phone Number"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">

<input id="address" placeholder="Address"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">


<select id="plan"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">

<option>FiberX 1500 — 300 Mbps — ₱1500</option>
<option>FiberX 2000 — 500 Mbps — ₱2000</option>
<option>FiberX 2500 — 700 Mbps — ₱2500</option>
<option>FiberX 3500 — 1 Gbps — ₱3500</option>

<option>Super FiberX 1349 — 200 Mbps — ₱1349</option>
<option>Super FiberX 1599 — 400 Mbps — ₱1599</option>

<option>GameChanger EZ — 400 Mbps — ₱1800</option>

<option>FiberX Time-of-Day 1699 — 400 Mbps Day / 600 Mbps Night — ₱1699</option>
<option>FiberX Time-of-Day 3000 — 800 Mbps Day / 600 Mbps Night — ₱3000</option>

<option>FiberXtreme 4500 — 400 Mbps — ₱4500</option>
<option>FiberXtreme 7000 — 800 Mbps — ₱7000</option>

</select>


<select id="status"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>


<label class="text-xs text-slate-400">Installation Date</label>
<input type="date" id="install"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">


<label class="text-xs text-slate-400">Follow Up Date</label>
<input type="date" id="follow"
class="w-full px-4 py-2 bg-slate-900 border border-slate-700 rounded">


<div class="flex gap-3 pt-2">

<button class="flex-1 py-2 bg-blue-500 rounded">
Save
</button>

<button type="button" id="cancel"
class="flex-1 py-2 bg-slate-700 rounded">
Cancel
</button>

</div>

</form>

</div>

</div>



<script>

const $ = id => document.getElementById(id)

let records = JSON.parse(localStorage.getItem("convergeCRM")) || []


function saveData(){
localStorage.setItem("convergeCRM",JSON.stringify(records))
}



function getCommission(plan){

const price=parseInt(plan.match(/₱(\d+)/)[1])

if(price<=1500) return 800
if(price<=2500) return 1200
if(price>=3000) return 2000

return 1000
}



function renderStats(){

let installed=records.filter(r=>r.status==="Installed").length

let commission=records
.filter(r=>r.status==="Installed")
.reduce((sum,r)=>sum+getCommission(r.plan),0)

$("stats").innerHTML=`

<div class="bg-slate-800 p-4 rounded">
<p class="text-xs text-slate-400">TOTAL</p>
<p class="text-2xl font-bold">${records.length}</p>
</div>

<div class="bg-slate-800 p-4 rounded">
<p class="text-xs text-slate-400">INSTALLED</p>
<p class="text-2xl font-bold">${installed}</p>
</div>

<div class="bg-slate-800 p-4 rounded">
<p class="text-xs text-slate-400">COMMISSION</p>
<p class="text-2xl font-bold text-green-400">₱${commission}</p>
</div>

`

}



function renderPlanStats(){

let stats={}

records.forEach(r=>{
stats[r.plan]=(stats[r.plan]||0)+1
})

$("planStats").innerHTML=""

Object.entries(stats).forEach(([plan,count])=>{

let div=document.createElement("div")

div.className="bg-slate-900 p-3 rounded text-sm"

div.innerHTML=`
<p class="text-slate-400">${plan}</p>
<p class="text-lg font-bold">${count}</p>
`

$("planStats").appendChild(div)

})

}



function renderTable(){

let search=$("search").value.toLowerCase()
let status=$("filter").value

$("table").innerHTML=""

records.filter(r=>{

let s=r.name.toLowerCase().includes(search)
let st=status==="all"||r.status===status

return s&&st

})
.forEach((r,i)=>{

let commission=getCommission(r.plan)

let tr=document.createElement("tr")

tr.className="border-t border-slate-700"

tr.innerHTML=`

<td class="px-4 py-3">${r.code}</td>
<td class="px-4 py-3">${r.name}</td>
<td class="px-4 py-3">${r.phone}</td>
<td class="px-4 py-3">${r.plan}</td>
<td class="px-4 py-3">${r.status}</td>
<td class="px-4 py-3 text-green-400">₱${commission}</td>

<td class="px-4 py-3 flex gap-2">

<button onclick="advance(${i})">
<i data-lucide="arrow-right"></i>
</button>

<button onclick="delRec(${i})">
<i data-lucide="trash"></i>
</button>

</td>
`

$("table").appendChild(tr)

})

lucide.createIcons()

}



function advance(i){

const order=["Application","OMD","Approved","Scheduled","Installed"]

let idx=order.indexOf(records[i].status)

if(idx<order.length-1)
records[i].status=order[idx+1]

saveData()

renderStats()
renderTable()
renderPlanStats()

}



function delRec(i){

records.splice(i,1)

saveData()

renderStats()
renderTable()
renderPlanStats()

}



$("btn-add").onclick=()=>{

$("modal").classList.remove("hidden")

}



$("cancel").onclick=()=>{

$("modal").classList.add("hidden")

}



$("form").onsubmit=e=>{

e.preventDefault()

records.push({

code:$("code").value,
name:$("name").value,
phone:$("phone").value,
address:$("address").value,
plan:$("plan").value,
status:$("status").value,
install:$("install").value,
follow:$("follow").value

})

saveData()

$("modal").classList.add("hidden")

renderStats()
renderTable()
renderPlanStats()

}



$("btn-calendar").onclick=()=>{

let installs=records.filter(r=>r.install)

let txt="Install Schedule\n\n"

installs.forEach(r=>{
txt+=`${r.install} - ${r.name}\n`
})

alert(txt)

}



$("btn-export").onclick=()=>{

let blob=new Blob([JSON.stringify(records)],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="convergeCRM.json"
a.click()

}



$("importFile").onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(){

records=JSON.parse(reader.result)

saveData()

renderStats()
renderTable()
renderPlanStats()

}

reader.readAsText(file)

}



$("search").oninput=renderTable
$("filter").onchange=renderTable



renderStats()
renderTable()
renderPlanStats()

lucide.createIcons()

</script>

</body>
</html>
