<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent CRM PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0f172a;
color:#e2e8f0;
}

.sidebar{
width:240px;
background:#020617;
border-right:1px solid #1e293b;
}

.sidebar button{
width:100%;
display:flex;
gap:10px;
padding:10px;
border-radius:8px;
}

.sidebar button:hover{
background:#1e293b;
}

.card{
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
padding:18px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.leaflet-container{
z-index:1;
}

</style>

</head>


<body class="flex h-screen">

<!-- SIDEBAR -->

<div class="sidebar p-4">

<h2 class="text-lg font-semibold mb-6">
Agent CRM PRO
</h2>

<div class="space-y-2">

<button onclick="scrollToSection('dashboard')">
<i data-lucide="layout-dashboard"></i>
Dashboard
</button>

<button onclick="scrollToSection('mapSection')">
<i data-lucide="map"></i>
Map
</button>

<button onclick="scrollToSection('analytics')">
<i data-lucide="bar-chart"></i>
Sales Charts
</button>

<button onclick="scrollToSection('tableSection')">
<i data-lucide="users"></i>
Applications
</button>

</div>

</div>


<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<div class="flex justify-between items-center px-6 py-4 border-b border-slate-800 bg-slate-900">

<h1 class="text-xl font-semibold">
Converge Sales Dashboard
</h1>

<div class="flex gap-3">

<button id="btn-add"
class="bg-blue-600 px-4 py-2 rounded-lg flex items-center gap-2">
<i data-lucide="plus"></i>
New Application
</button>

<button id="btn-export"
class="bg-slate-700 px-4 py-2 rounded-lg">
Export
</button>

<label class="bg-slate-700 px-4 py-2 rounded-lg cursor-pointer">
Import
<input type="file" id="importFile" hidden>
</label>

</div>

</div>


<!-- CONTENT -->

<div class="p-6 space-y-6 overflow-auto">

<div id="dashboard" class="grid grid-cols-4 gap-4"></div>

<div id="mapSection" class="card">

<h2 class="font-semibold mb-3">Customer Locations</h2>

<div id="map" style="height:300px;border-radius:8px;"></div>

</div>

<div id="analytics" class="card">

<h2 class="font-semibold mb-3">Plan Sales Chart</h2>

<canvas id="salesChart"></canvas>

</div>

<div id="tableSection" class="card">

<h2 class="font-semibold mb-4">Applications</h2>

<table class="w-full text-sm">

<thead class="text-slate-400 border-b border-slate-800">

<tr>
<th class="text-left py-2">Code</th>
<th>Customer</th>
<th>Phone</th>
<th>Plan</th>
<th>Status</th>
<th>Commission</th>
<th></th>
</tr>

</thead>

<tbody id="table"></tbody>

</table>

</div>

</div>

<footer class="text-center text-xs text-slate-500 py-4 border-t border-slate-800">

© 2026 Converge Agent CRM PRO  
By Randy Tadlas

</footer>

</div>


<!-- MODAL -->

<div id="modal" class="modal hidden">

<div class="card w-full max-w-md">

<h2 class="font-semibold mb-3">New Application</h2>

<form id="form" class="space-y-3">

<input id="code" placeholder="Code" class="w-full p-3 rounded bg-slate-900">

<input id="name" placeholder="Customer Name" class="w-full p-3 rounded bg-slate-900">

<input id="phone" placeholder="Phone" class="w-full p-3 rounded bg-slate-900">

<input id="address" placeholder="Address" class="w-full p-3 rounded bg-slate-900">

<select id="plan" class="w-full p-3 rounded bg-slate-900">

<option>Surf2Sawa 25 Mbps — ₱700</option>

<option>Super FiberX 1349 — 200 Mbps — ₱1349</option>
<option>Super FiberX 1599 — 400 Mbps — ₱1599</option>
<option>Super FiberX 2599 — 800 Mbps — ₱2599</option>

<option>FiberX 1500 — 300 Mbps — ₱1500</option>
<option>FiberX 2000 — 500 Mbps — ₱2000</option>
<option>FiberX 2500 — 700 Mbps — ₱2500</option>
<option>FiberX 3500 — 1 Gbps — ₱3500</option>

<option>GameChanger EZ — 400 Mbps — ₱1800</option>
<option>GameChanger Pro — 700 Mbps — ₱2500</option>

<option>FiberX Time-of-Day 1699 — ₱1699</option>
<option>FiberX Time-of-Day 3000 — ₱3000</option>

<option>FiberXtreme 4500 — 400 Mbps — ₱4500</option>
<option>FiberXtreme 7000 — 800 Mbps — ₱7000</option>

<option>MicroBiz 1500 — 300 Mbps — ₱1500</option>
<option>MicroBiz 2500 — 700 Mbps — ₱2500</option>
<option>MicroBiz 3500 — 1 Gbps — ₱3500</option>

<option>FlexiBiz 3000 — 500 Mbps — ₱3000</option>
<option>FlexiBiz 5000 — 800 Mbps — ₱5000</option>
<option>FlexiBiz 7000 — 1 Gbps — ₱7000</option>

</select>

<select id="status" class="w-full p-3 rounded bg-slate-900">

<option>Application</option>
<option>OMD</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>

<button class="w-full bg-blue-600 p-3 rounded">
Save
</button>

<button type="button" id="cancel" class="w-full bg-slate-700 p-3 rounded">
Cancel
</button>

</form>

</div>

</div>


<script>

const $=id=>document.getElementById(id)

let records=JSON.parse(localStorage.getItem("crm"))||[]

let map
let chart

function save(){
localStorage.setItem("crm",JSON.stringify(records))
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

function price(plan){
return parseInt(plan.match(/₱(\d+)/)[1])
}

function commission(plan){
let p=price(plan)
if(p<=1500)return 800
if(p<=2500)return 1200
return 2000
}

function renderStats(){

let installed=records.filter(r=>r.status==="Installed").length
let comm=records.reduce((t,r)=>t+commission(r.plan),0)

$("dashboard").innerHTML=`

<div class="card"><p>Applications</p><h2>${records.length}</h2></div>
<div class="card"><p>Installed</p><h2>${installed}</h2></div>
<div class="card"><p>Commission</p><h2>₱${comm}</h2></div>
<div class="card"><p>Pending</p><h2>${records.length-installed}</h2></div>

`
}

function renderTable(){

$("table").innerHTML=""

records.forEach((r,i)=>{

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${r.code}</td>
<td>${r.name}</td>
<td>${r.phone}</td>
<td>${r.plan}</td>
<td>${r.status}</td>
<td>₱${commission(r.plan)}</td>

<td>
<button onclick="advance(${i})"><i data-lucide="arrow-right"></i></button>
<button onclick="delRec(${i})"><i data-lucide="trash"></i></button>
</td>

`

$("table").appendChild(tr)

})

lucide.createIcons()
}

function renderChart(){

let stats={}
records.forEach(r=>{
stats[r.plan]=(stats[r.plan]||0)+1
})

let labels=Object.keys(stats)
let data=Object.values(stats)

if(chart)chart.destroy()

chart=new Chart(document.getElementById("salesChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Plan Sales",data:data}]}
})
}

function advance(i){
const order=["Application","OMD","Approved","Scheduled","Installed"]
let idx=order.indexOf(records[i].status)
if(idx<order.length-1)records[i].status=order[idx+1]
save()
renderStats()
renderTable()
renderChart()
}

function delRec(i){
records.splice(i,1)
save()
renderStats()
renderTable()
renderChart()
}

$("btn-add").onclick=()=>{$("modal").classList.remove("hidden")}
$("cancel").onclick=()=>{$("modal").classList.add("hidden")}

$("form").onsubmit=e=>{
e.preventDefault()

records.push({
code:$("code").value,
name:$("name").value,
phone:$("phone").value,
address:$("address").value,
plan:$("plan").value,
status:$("status").value
})

save()

$("modal").classList.add("hidden")

renderStats()
renderTable()
renderChart()
}

function initMap(){
map=L.map('map').setView([10.3157,123.8854],12)
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
}

renderStats()
renderTable()
renderChart()

lucide.createIcons()

window.onload=initMap

</script>

</body>
</html>
