<!doctype html>
<html lang="en" class="h-full">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Converge Agent Dashboard</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'DM Sans',sans-serif;
margin:0;
}

.font-display{
font-family:'Fraunces',serif;
}

.status-pill{
padding:4px 12px;
border-radius:999px;
font-size:12px;
font-weight:600;
}

.card-hover{
transition:.2s;
}

.card-hover:hover{
transform:translateY(-2px);
box-shadow:0 8px 24px rgba(0,0,0,.2);
}

.modal-backdrop{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>


<body class="h-full bg-slate-900 text-slate-100">


<div id="app" class="h-full w-full overflow-auto">


<header class="flex items-center justify-between px-6 py-5 border-b border-slate-700 bg-slate-800">

<div class="flex items-center gap-3">

<div class="w-10 h-10 rounded-xl flex items-center justify-center bg-blue-500">
<i data-lucide="zap"></i>
</div>

<div>
<h1 class="font-display text-xl font-bold">Converge Agent Dashboard</h1>
<p class="text-sm text-slate-400">Welcome back Agent</p>
</div>

</div>


<div class="flex gap-3">

<button id="btn-calendar"
class="px-4 py-2 rounded-xl bg-slate-700 hover:bg-slate-600 text-sm">
Calendar
</button>

<button id="btn-add"
class="px-4 py-2 rounded-xl bg-blue-500 hover:bg-blue-600 text-sm flex gap-2 items-center">
<i data-lucide="plus"></i>
New Application
</button>

</div>

</header>



<main class="p-6">

<div id="stats-row" class="grid grid-cols-2 lg:grid-cols-6 gap-4 mb-6"></div>



<div class="mb-5 flex gap-3">

<input
id="search-input"
placeholder="Search customer..."
class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 flex-1">

<select id="filter-status"
class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700">

<option value="all">All Status</option>
<option>Application</option>
<option>Survey</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>

</div>



<div class="rounded-xl overflow-hidden border border-slate-700">

<table class="w-full text-sm">

<thead class="bg-slate-800 text-slate-400">

<tr>

<th class="px-4 py-3 text-left">Customer</th>
<th class="px-4 py-3 text-left">Phone</th>
<th class="px-4 py-3 text-left">Address</th>
<th class="px-4 py-3 text-left">Product</th>
<th class="px-4 py-3 text-left">Status</th>
<th class="px-4 py-3 text-left">Actions</th>

</tr>

</thead>

<tbody id="table-body"></tbody>

</table>

</div>

</main>



<!-- MODAL -->

<div id="modal" class="modal-backdrop hidden">

<div class="bg-slate-800 border border-slate-700 p-6 rounded-xl w-full max-w-lg">

<h2 class="font-display text-lg mb-4">Application</h2>

<form id="app-form" class="space-y-4">


<input id="f-name"
placeholder="Customer Name"
required
class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">


<input id="f-phone"
placeholder="Phone Number"
required
class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">


<input id="f-address"
placeholder="Address"
required
class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">


<select id="f-product"
class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">

<option>Fiber Internet</option>
<option>Cable Internet</option>

</select>


<select id="f-status"
class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">

<option>Application</option>
<option>Survey</option>
<option>Approved</option>
<option>Scheduled</option>
<option>Installed</option>

</select>


<label class="text-sm text-slate-400">Installation Date</label>
<input type="date" id="f-install" class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">


<label class="text-sm text-slate-400">Follow Up Date</label>
<input type="date" id="f-follow" class="w-full px-4 py-2 rounded-xl bg-slate-900 border border-slate-700">


<div class="flex gap-3 pt-2">

<button class="flex-1 py-2 rounded-xl bg-blue-500">Save</button>

<button type="button" id="btn-cancel"
class="flex-1 py-2 rounded-xl bg-slate-700">Cancel</button>

</div>

</form>

</div>

</div>



<script>

const $ = id => document.getElementById(id)

let records = []

let editIndex = null

const COMMISSION = 1500



function renderStats(){

const counts = {
Application:0,
Survey:0,
Approved:0,
Scheduled:0,
Installed:0
}

records.forEach(r=>{
counts[r.status]++
})

const installs = counts.Installed
const commission = installs * COMMISSION

$("stats-row").innerHTML = `

<div class="card-hover bg-slate-800 border border-slate-700 rounded-xl p-4">
<p class="text-slate-400 text-xs">TOTAL</p>
<p class="text-2xl font-bold">${records.length}</p>
</div>

<div class="card-hover bg-slate-800 border border-slate-700 rounded-xl p-4">
<p class="text-slate-400 text-xs">INSTALLED</p>
<p class="text-2xl font-bold">${installs}</p>
</div>

<div class="card-hover bg-slate-800 border border-slate-700 rounded-xl p-4">
<p class="text-slate-400 text-xs">COMMISSION</p>
<p class="text-2xl font-bold text-green-400">₱${commission}</p>
</div>

`

}



function renderTable(){

const tbody = $("table-body")

tbody.innerHTML=""

const search = $("search-input").value.toLowerCase()

const status = $("filter-status").value

records
.filter(r=>{

const matchSearch = r.name.toLowerCase().includes(search)

const matchStatus = status==="all"||r.status===status

return matchSearch && matchStatus

})
.forEach((r,i)=>{

const tr=document.createElement("tr")

tr.className="border-t border-slate-700"

tr.innerHTML=`

<td class="px-4 py-3">${r.name}</td>

<td class="px-4 py-3">${r.phone}</td>

<td class="px-4 py-3">${r.address}</td>

<td class="px-4 py-3">${r.product}</td>

<td class="px-4 py-3">
<span class="status-pill bg-slate-700">${r.status}</span>
</td>

<td class="px-4 py-3 flex gap-2">

<button onclick="advance(${i})">
<i data-lucide="arrow-right"></i>
</button>

<button onclick="removeRec(${i})">
<i data-lucide="trash"></i>
</button>

</td>
`

tbody.appendChild(tr)

})

lucide.createIcons()

}



function advance(i){

const order=["Application","Survey","Approved","Scheduled","Installed"]

let idx = order.indexOf(records[i].status)

if(idx<order.length-1)
records[i].status = order[idx+1]

renderStats()
renderTable()

}



function removeRec(i){

records.splice(i,1)

renderStats()
renderTable()

}



$("btn-add").onclick=()=>{

$("modal").classList.remove("hidden")

}



$("btn-cancel").onclick=()=>{

$("modal").classList.add("hidden")

}



$("app-form").onsubmit=(e)=>{

e.preventDefault()

const data={

name:$("f-name").value,
phone:$("f-phone").value,
address:$("f-address").value,
product:$("f-product").value,
status:$("f-status").value,
install:$("f-install").value,
follow:$("f-follow").value

}

records.push(data)

$("modal").classList.add("hidden")

renderStats()
renderTable()

}



$("btn-calendar").onclick=()=>{

const installs = records.filter(r=>r.install)

let msg="Install Schedule\n\n"

installs.forEach(r=>{
msg+=`${r.install} - ${r.name}\n`
})

alert(msg)

}



function checkFollowups(){

const today=new Date().toISOString().split("T")[0]

const due=records.filter(r=>r.follow===today)

if(due.length)
alert(`${due.length} follow ups today`)

}

setTimeout(checkFollowups,2000)



$("search-input").oninput=renderTable
$("filter-status").onchange=renderTable



renderStats()
renderTable()

lucide.createIcons()

</script>


</body>
</html>
