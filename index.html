<!DOCTYPE html>
<html>
<head>

<title>FiberAgent CRM</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#6a5acd,#4a6cf7);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.login h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#4a6cff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#374fd6;
}

</style>
</head>

<body>

<div class="login">

<h2>FiberAgent CRM</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

/* USER DATABASE */

const users={

agent1:{pass:"1234",role:"agent"},
agent2:{pass:"1234",role:"agent"},

admin:{pass:"admin123",role:"admin"},

installer1:{pass:"1111",role:"installer"},
installer2:{pass:"1111",role:"installer"}

}

/* LOGIN FUNCTION */

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(users[u] && users[u].pass===p){

let role=users[u].role

/* AGENT LOGIN */

if(role==="agent"){

localStorage.setItem("agent",u)
window.location="agent.html"

}

/* ADMIN LOGIN */

if(role==="admin"){

window.location="admin.html"

}

/* INSTALLER LOGIN */

if(role==="installer"){

localStorage.setItem("installer",u)
window.location="installer.html"

}

}else{

alert("Invalid login")

}

}

</script>

</body>
</html>
