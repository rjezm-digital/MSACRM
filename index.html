<!DOCTYPE html>
<html>
<head>

<title>Converge Agent CRM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

.login{
width:320px;
margin:120px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.login input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:8px 12px;
background:#4a6cf7;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.dashboard{
display:none;
}

.sidebar{
width:220px;
background:white;
position:fixed;
height:100%;
padding:20px;
box-shadow:2px 0 10px rgba(0,0,0,0.05);
}

.sidebar button{
display:block;
width:100%;
margin:6px 0;
}

.main{
margin-left:240px;
padding:30px;
}

.section{
display:none;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
color:white;
padding:20px;
border-radius:10px;
}

.c1{background:#6a11cb;}
.c2{background:#ff758c;}
.c3{background:#42e695;}
.c4{background:#ff9966;}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
}

.delete{
background:red;
}

#map{
height:500px;
}

</style>

</head>

<body>

<div class="login" id="login">

<h2>Agent Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="dashboard" id="dashboard">

<div class="sidebar">

<h3>Converge</h3>

<button onclick="showSection('dash')">Dashboard</button>
<button onclick="showSection('subs')">Subscribers</button>
<button onclick="showSection('mapsec')">Map</button>

</div>

<div class="main">

<div id="dash" class="section">

<h2>Subscriber Monitoring</h2>

<div class="cards">

<div class="card c1">Applications<br><span id="total">0</span></div>
<div class="card c2">Pending<br><span id="pending">0</span></div>
<div class="card c3">Installed<br><span id="installed">0</span></div>
<div class="card c4">Commission<br>₱<span id="commission">0</span></div>

</div>

</div>

<div id="subs" class="section">

<h2>Add Subscriber</h2>

<input id="name" placeholder="Subscriber Name">
<input id="phone" placeholder="Phone Number">
<input id="code" placeholder="Application Code">
<input id="address" placeholder="Address">

<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">

<select id="plan">

<option value="1349">Super FiberX Play 1349</option>
<option value="1599">Super FiberX Max 1599</option>
<option value="2599">Super FiberX Ultra 2599</option>

<option value="1500">FiberX 1500</option>
<option value="2000">FiberX 2000</option>
<option value="2500">FiberX 2500</option>
<option value="3500">FiberX 3500</option>
<option value="7000">FiberX 7000</option>

<option value="1700">FiberX 1500 + Vision</option>
<option value="2200">FiberX 2000 + Vision</option>
<option value="2700">FiberX 2500 + Vision</option>

<option value="1699">TOD 1699</option>
<option value="1999">TOD 1999</option>
<option value="3000">TOD 3000</option>
<option value="3500">TOD 3500</option>

<option value="1500">FlexiBIZ 1500</option>
<option value="2000">FlexiBIZ 2000</option>
<option value="3000">FlexiBIZ 3000</option>
<option value="5000">FlexiBIZ 5000</option>

<option value="1449">MicroBIZ MAX 1449</option>
<option value="1549">MicroBIZ MAX 1549</option>
<option value="1749">MicroBIZ MAX 1749</option>
<option value="2099">MicroBIZ MAX 2099</option>
<option value="2449">MicroBIZ MAX 2449</option>

</select>

<button onclick="add()">Add Subscriber</button>

<br><br>

<input id="search" placeholder="Search subscriber..." onkeyup="render()">

<button onclick="exportCSV()">Export Excel</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Code</th>
<th>Plan</th>
<th>Status</th>
<th>Next</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<div id="mapsec" class="section">

<h2>Subscriber Map</h2>

<div id="map"></div>

</div>

</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let subscribers=[]

let stages=[
"Applied",
"OMD",
"Pending/Approved",
"For Installation",
"Installed"
]

let map

function login(){

let username=document.getElementById("user").value
let password=document.getElementById("pass").value

if(username==="agent" && password==="1234"){

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

showSection("dash")
initMap()

}else{

alert("Wrong username or password")

}

}

function showSection(id){

document.querySelectorAll(".section").forEach(s=>{
s.style.display="none"
})

document.getElementById(id).style.display="block"

}

function initMap(){

map=L.map('map').setView([9.65,124.02],11)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

}

function add(){

subscribers.push({

name:name.value,
phone:phone.value,
code:code.value,
plan:plan.value,
lat:lat.value,
lng:lng.value,
status:0

})

render()

}

function nextStep(i){

if(subscribers[i].status<stages.length-1){

subscribers[i].status++

}

render()

}

function deleteRow(i){

subscribers.splice(i,1)

render()

}

function render(){

let table=document.getElementById("table")

table.innerHTML=""

let searchText=search.value.toLowerCase()

let pendingCount=0
let installedCount=0
let totalCommission=0

if(map){
map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer)
})
}

subscribers.forEach((s,i)=>{

if(
s.name.toLowerCase().includes(searchText)||
s.phone.includes(searchText)||
s.code.toLowerCase().includes(searchText)
){

let stage=stages[s.status]

let commission=(s.plan/2)-50

if(stage==="Installed"){

installedCount++
totalCommission+=commission

}else{

pendingCount++

}

table.innerHTML+=`

<tr>
<td>${s.name}</td>
<td>${s.phone}</td>
<td>${s.code}</td>
<td>₱${s.plan}</td>
<td>${stage}</td>
<td><button onclick="nextStep(${i})">Next</button></td>
<td><button class="delete" onclick="deleteRow(${i})">Delete</button></td>
</tr>
`

if(map && s.lat && s.lng){

L.marker([s.lat,s.lng])
.addTo(map)
.bindPopup(s.name+"<br>"+s.phone)

}

}

})

total.innerText=subscribers.length
pending.innerText=pendingCount
installed.innerText=installedCount
commission.innerText=totalCommission

}

function exportCSV(){

let csv="Name,Phone,Code,Plan\n"

subscribers.forEach(s=>{
csv+=`${s.name},${s.phone},${s.code},${s.plan}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="subscribers.csv"

a.click()

}

</script>

</body>
</html>
