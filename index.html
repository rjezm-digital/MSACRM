<!DOCTYPE html>
<html>
<head>

<title>Fiber CRM Login</title>

<style>

body{
font-family:Arial;
background:#eef1f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:340px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px;
width:100%;
border:none;
background:#4e6cff;
color:white;
border-radius:6px;
cursor:pointer;
}

.section{
margin-bottom:20px;
}

h3{
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="box">

<h2>Fiber CRM</h2>

<!-- AGENT LOGIN -->

<div class="section">

<h3>Agent Login</h3>

<input id="agentUser" placeholder="Agent Username">

<input id="agentPass" type="password" placeholder="Password">

<button onclick="loginAgent()">Login Agent</button>

</div>


<!-- ADMIN LOGIN -->

<div class="section">

<h3>Admin Login</h3>

<input id="adminUser" placeholder="Admin Username">

<input id="adminPass" type="password" placeholder="Password">

<button onclick="loginAdmin()">Login Admin</button>

</div>


<!-- INSTALLER LOGIN -->

<div class="section">

<h3>Installer Team Login</h3>

<input id="installerUser" placeholder="Team Name (TeamA / TeamB / TeamC)">

<input id="installerPass" type="password" placeholder="Password">

<button onclick="loginInstaller()">Login Installer</button>

</div>

</div>


<script>

/* AGENT LOGIN */

function loginAgent(){

let u=document.getElementById("agentUser").value
let p=document.getElementById("agentPass").value

if(p==="1234"){

localStorage.setItem("agent",u)

window.location="agent.html"

}

else{

alert("Invalid agent password")

}

}


/* ADMIN LOGIN */

function loginAdmin(){

let u=document.getElementById("adminUser").value
let p=document.getElementById("adminPass").value

if(u==="admin" && p==="admin123"){

window.location="admin.html"

}

else{

alert("Invalid admin login")

}

}


/* INSTALLER LOGIN */

function loginInstaller(){

let u=document.getElementById("installerUser").value
let p=document.getElementById("installerPass").value

if(p!=="1234"){

alert("Invalid installer password")

return

}

if(u==="TeamA"){

localStorage.setItem("installerTeam","Team A")
window.location="installer.html"

}

else if(u==="TeamB"){

localStorage.setItem("installerTeam","Team B")
window.location="installer.html"

}

else if(u==="TeamC"){

localStorage.setItem("installerTeam","Team C")
window.location="installer.html"

}

else{

alert("Installer team not recognized")

}

}

</script>

</body>
</html>
